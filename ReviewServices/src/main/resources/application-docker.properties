job-service.url=http://job:8081
company-service.url=http://company:8082
review-service.url=http://review:8083



spring.application.name=review-services

server.port=8083
spring.datasource.url=jdbc:postgresql://postgres:5432/review
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform= org.hibernate.dialect.PostgreSQLDialect
eureka.client.service-url.defaultZone=http://servicereg:5761/eureka/

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


management.tracing.sampling.probability=1.0
spring.config.import=configserver:http://configserver:8080
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=10
spring.cloud.config.retry.multiplier=1.5
